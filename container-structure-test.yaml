schemaVersion: 2.0.0

metadataTest:
  envVars:
    - key: GOPATH
      value: /go
    - key: PATH
      value: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    - key: CGO_ENABLED
      value: "0"
    - key: GO_VERSION
      value: "1.25.8"
  workdir: /go

commandTests:
  - name: go binary is available
    command: go
    args: ["version"]
    expectedOutput:
      - "go version go[0-9]+\\.[0-9]+(\\.[0-9]+)? linux/amd64"

  - name: ca-certificates package is installed
    command: dpkg
    args: ["-s", "ca-certificates"]
    expectedOutput:
      - "Version: 20240203"

fileExistenceTests:
  - name: Go toolchain directory exists
    path: /usr/local/go
    shouldExist: true
    isExecutableBy: any

  - name: go command binary exists
    path: /usr/local/go/bin/go
    shouldExist: true
    isExecutableBy: any

  - name: GOPATH root exists with expected permissions
    path: /go
    shouldExist: true
    permissions: "drwxr-x---"

  - name: GOPATH src exists with expected permissions
    path: /go/src
    shouldExist: true
    permissions: "drwxr-x---"

  - name: GOPATH bin exists with expected permissions
    path: /go/bin
    shouldExist: true
    permissions: "drwxr-x---"
