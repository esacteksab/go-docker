name: Build and Push Docker Image

on:
  schedule:
    # Run at 9:00 AM Central Time (US/Chicago) every Friday
    - cron: '0 14 * * 5'

  # Allow manual triggering
  workflow_dispatch:

permissions:
    contents: read

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
      latest: ${{ steps.latest.outputs.version }}
    steps:
      - name: Get Go versions
        id: versions
        env:
          GO_VERSION: ${{ vars.GO_VERSION || '' }}
        run: |
          if [ -n "$GO_VERSION" ]; then
            # Repository variable overrides the API — build only that version
            VERSIONS_ARRAY=$(jq -cn --arg v "$GO_VERSION" '[$v]')
          else
            VERSIONS=$(
              curl -s 'https://go.dev/dl/?mode=json' \
                | jq -r '
                  [.[] | select(.stable) | .version]
                  | group_by(split(".")[0:2] | join("."))
                  | map(max_by(ltrimstr("go") | split(".") | map(tonumber)))[]
                ' | sed 's/go//'
            )
            VERSIONS_ARRAY=$(echo "$VERSIONS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "matrix={\"go-version\":$VERSIONS_ARRAY}" >> $GITHUB_OUTPUT

      - name: Get latest version
        id: latest
        run: |
          matrix='${{ steps.versions.outputs.matrix }}'
          latest=$(echo "$matrix" | jq -r '.["go-version"][-1]')
          echo "version=$latest" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
            persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Resolve Go image digest
        id: go-image
        run: |
          digest=$(docker buildx imagetools inspect "golang:${{ matrix.go-version }}-bookworm" | awk '/^Digest:[[:space:]]/ {print $2; exit}')
          if [ -z "$digest" ]; then
            echo "Failed to resolve digest for golang:${{ matrix.go-version }}-bookworm" >&2
            exit 1
          fi
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: esacteksab
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Get current date in YYYY-MM-DD format
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Set tags
        id: tags
        run: |
          stable_line=$(echo "${{ matrix.go-version }}" | cut -d. -f1,2)
          tags="esacteksab/go:${{ matrix.go-version }}\nesacteksab/go:${stable_line}\nesacteksab/go:${{ matrix.go-version }}-${{ steps.date.outputs.date }}"
          if [ "${{ matrix.go-version }}" = "${{ needs.get-versions.outputs.latest }}" ]; then
            tags="${tags}\nesacteksab/go:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo -e "$tags" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GO_VERSION=${{ matrix.go-version }}
            GO_IMAGE_DIGEST=${{ steps.go-image.outputs.digest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
